  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const project = urlParams.get('project');
  
      const projects = {
        'basic-landing-page': {
          title: 'Basic Landing Page',
          description: 'Welcome to my Basic Landing Page.',
          images: [
            'assets/img/portfolio/Work Samole.png',
            'assets/img/portfolio/Work Sample 2.png'
          ],
          info: [
            { label: 'Category', value: 'Web Design' },
            { label: 'Project Date', value: '01 Feburary, 2023' },
            // { label: 'Project URL', value: '<a href="#">www.basiclanding.com</a>' }
          ]
        },
        'inventory-website': {
          title: 'Complete Inventory Website',
          description: 'The Inventory Management System is a web-based application developed using Next.js, a powerful React framework, and styled with Tailwind CSS. It offers a seamless and modern interface for managing product inventory efficiently. This system is designed to simplify inventory tracking, reduce manual errors, and provide real-time updates for better decision-making.',
          images: [
            'assets/img/portfolio/Car Inventory.png',
            'assets/img/portfolio/Car inventory page.png',
            'assets/img/portfolio/Car inventory 3 page.png',
            // 'assets/img/portfolio/Car inventory 4 page.png',
            // 'assets/img/portfolio/Car inventory 5 page.png',
            // 'assets/img/portfolio/Car inventory 6 page.png',
          ],
          info: [
            { label: 'Category', value: 'Web Development' },
            { label: 'Project Date', value: '28 October 2024' },
            // { label: 'Client', value: 'XYZ Company' },
            // { label: 'Project URL', value: '<a href="#">www.inventory.com</a>' }
          ]
        },
        'gpt-clone': {
          title: 'GPT Clone',
          description: 'The GPT Clone is an AI-powered web application built using the MERN Stack (MongoDB, Express.js, React.js, and Node.js). This application leverages the power of OpenAI GPT API to provide dynamic and interactive chatbot capabilities, offering a seamless and conversational AI experience. The app allows users to chat with a simulated GPT model, asking questions or engaging in conversation with AI-generated responses.',
          images: [
            'assets/img/portfolio/Work Sample 3.png',
            'assets/img/portfolio/Work Sample 4.png',
            'assets/img/portfolio/Work Sample 5.png',
          ],
          info: [
            { label: 'Category', value: 'AI & Chatbot' },
            { label: 'Project Date', value: '14 November, 2023' },
            // { label: 'Client', value: 'OpenAI' },
            // { label: 'Project URL', value: '<a href="#">www.gptclone.com</a>' }
          ]
        },
        'weather-web': {
          title: 'Weather Web',
          description: 'The Weather Web is a web application developed using the MERN Stack (MongoDB, Express.js, React.js, and Node.js) and integrates a Weather API to provide real-time weather updates for any location across the globe. The app allows users to enter the name of a city and instantly view up-to-date weather information, including temperature, humidity, wind speed, and weather condition',
          images: [
            'assets/img/portfolio/Work Sample 7.png',
          ],
          info: [
            { label: 'Category', value: 'Web Development' },
            { label: 'Project Date', value: '20 January, 2024' },
            // { label: 'Client', value: 'OpenAI' },
            // { label: 'Project URL', value: '<a href="#">www.gptclone.com</a>' }
          ]
        }
      };
  
      const projectData = projects[project];
  
      if (projectData) {
        document.getElementById('project-title').textContent = projectData.title;
        document.getElementById('project-description').textContent = projectData.description;
  
        const imagesContainer = document.getElementById('project-images');
        imagesContainer.innerHTML = '';
        projectData.images.forEach(image => {
          const imageSlide = document.createElement('div');
          imageSlide.classList.add('swiper-slide');
          imageSlide.innerHTML = `<img src="${image}" alt="${projectData.title}">`;
          imagesContainer.appendChild(imageSlide);
        });
  
        const infoContainer = document.getElementById('project-info');
        infoContainer.innerHTML = '';
        projectData.info.forEach(item => {
          const listItem = document.createElement('li');
          listItem.innerHTML = `<strong>${item.label}</strong>: ${item.value}`;
          infoContainer.appendChild(listItem);
        });
      } 
      
      else {
        document.querySelector('.portfolio-details').innerHTML = '<h2>Project Not Found</h2>';
      }
    });
  </script>
